<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 16px;
      line-height: 1.6;
    }
    .post-card {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .post-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }
    .post-title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .post-meta {
      font-size: 13px;
      color: #666;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .post-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .carousel {
      position: relative;
      width: 100%;
      background: #f0f0f0;
      aspect-ratio: 3/4;
      overflow: hidden;
    }
    .carousel .media-item {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .carousel .media-item.active {
      display: block;
    }
    .carousel video.media-item {
      background: #000;
    }
    .carousel-nav {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      color: white;
      font-size: 14px;
    }
    .carousel-nav button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }
    .carousel-nav button:hover {
      opacity: 0.8;
    }
    .post-content {
      padding: 20px;
      font-size: 14px;
      color: #333;
      white-space: pre-wrap;
    }
    .post-tags {
      padding: 0 20px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 12px;
      color: #1976d2;
      background: #e3f2fd;
      padding: 4px 10px;
      border-radius: 12px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .no-media {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="post-card" id="post-card">
    <div class="loading">加载中...</div>
  </div>

  <script type="module">
    let App;
    try {
      ({ App } = await import("@modelcontextprotocol/ext-apps"));
    } catch {
      App = window.__MCP_APP__?.App;
    }

    if (!App) {
      document.getElementById('post-card').innerHTML =
        '<div class="loading">无法加载 MCP App 运行时</div>';
      throw new Error('MCP App runtime not available');
    }

    const app = new App({ name: "post-viewer", version: "1.0.0" });

    app.ontoolresult = async (result) => {
      try {
        const post = JSON.parse(result.content[0].text);
        await renderPost(post);
      } catch (err) {
        const card = document.getElementById('post-card');
        card.innerHTML = '';
        const msg = document.createElement('div');
        msg.className = 'loading';
        msg.textContent = '数据解析失败: ' + String(err);
        card.appendChild(msg);
      }
    };

    await app.connect();

    async function renderPost(post) {
      const card = document.getElementById('post-card');
      card.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'post-header';

      const title = document.createElement('div');
      title.className = 'post-title';
      title.textContent = post.title || '(无标题)';
      header.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'post-meta';
      [
        `👤 ${post.author_name || '未知'}`,
        `❤️ ${post.like_count || 0}`,
        `💬 ${post.comment_count || 0}`,
        `⭐ ${post.collect_count || 0}`,
      ].forEach((text) => {
        const span = document.createElement('span');
        span.textContent = text;
        meta.appendChild(span);
      });
      header.appendChild(meta);
      card.appendChild(header);

      const media = post.media_files || [];
      if (media.length > 0) {
        card.appendChild(await buildCarousel(media));
      } else {
        const noMedia = document.createElement('div');
        noMedia.className = 'no-media';
        noMedia.textContent = '暂无媒体文件';
        card.appendChild(noMedia);
      }

      const content = document.createElement('div');
      content.className = 'post-content';
      content.textContent = post.content || '';
      card.appendChild(content);

      if (post.tags && Array.isArray(post.tags) && post.tags.length > 0) {
        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'post-tags';
        post.tags.forEach((t) => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = typeof t === 'string' ? t : t.name;
          tagsDiv.appendChild(tag);
        });
        card.appendChild(tagsDiv);
      }
    }

    async function toBlobUrl(url) {
      if (!url) return '';
      if (url.startsWith('blob:') || url.startsWith('https:') || url.startsWith('/')) return url;
      if (url.startsWith('http://')) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) return url;
          const blob = await resp.blob();
          return URL.createObjectURL(blob);
        } catch {
          return url;
        }
      }
      return url;
    }

    async function buildCarousel(media) {
      const carousel = document.createElement('div');
      carousel.className = 'carousel';
      carousel.id = 'carousel';

      const validMedia = media.filter((m) => m.src || m.url);

      if (validMedia.length === 0) {
        const noMedia = document.createElement('div');
        noMedia.className = 'no-media';
        noMedia.textContent = '暂无媒体文件';
        carousel.appendChild(noMedia);
        return carousel;
      }

      for (let i = 0; i < validMedia.length; i++) {
        const m = validMedia[i];
        const url = await toBlobUrl(m.src || m.url);
        const isVideo = m.media_type === 'video';
        let el;
        if (isVideo) {
          el = document.createElement('video');
          el.src = url;
          el.controls = true;
          el.muted = true;
          el.playsInline = true;
          el.preload = 'metadata';
        } else {
          el = document.createElement('img');
          el.src = url;
          el.alt = m.description || 'image';
          el.onerror = () => {
            el.style.display = 'none';
            el.classList.remove('active');
            const placeholder = document.createElement('div');
            placeholder.className = 'no-media';
            placeholder.textContent = '图片加载失败';
            placeholder.style.position = 'absolute';
            placeholder.style.top = '50%';
            placeholder.style.left = '50%';
            placeholder.style.transform = 'translate(-50%, -50%)';
            carousel.insertBefore(placeholder, el);
          };
        }
        el.className = 'media-item';
        if (i === 0) el.classList.add('active');
        carousel.appendChild(el);
      }

      if (validMedia.length > 1) {
        const nav = document.createElement('div');
        nav.className = 'carousel-nav';

        const prevBtn = document.createElement('button');
        prevBtn.textContent = '◀';

        const counter = document.createElement('span');
        counter.id = 'carousel-counter';
        counter.textContent = `1 / ${validMedia.length}`;

        const nextBtn = document.createElement('button');
        nextBtn.textContent = '▶';

        nav.appendChild(prevBtn);
        nav.appendChild(counter);
        nav.appendChild(nextBtn);
        carousel.appendChild(nav);

        const items = carousel.querySelectorAll('.media-item');
        let current = 0;
        const total = items.length;

        function show(index) {
          items.forEach((item, i) => {
            item.classList.toggle('active', i === index);
            if (item.tagName === 'VIDEO') {
              if (i === index) {
                item.play().catch(() => {});
              } else {
                item.pause();
                item.currentTime = 0;
              }
            }
          });
          counter.textContent = `${index + 1} / ${total}`;
        }

        prevBtn.addEventListener('click', () => {
          current = (current - 1 + total) % total;
          show(current);
        });

        nextBtn.addEventListener('click', () => {
          current = (current + 1) % total;
          show(current);
        });
      }

      return carousel;
    }
  </script>
</body>
</html>
